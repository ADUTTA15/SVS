<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVS Project Management Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes pulseOnce { 0%{box-shadow:0 0 0 0 rgba(56,189,248,.6)} 100%{box-shadow:0 0 0 12px rgba(56,189,248,0)} }
    .animate-pulse-once { animation: pulseOnce 1.6s ease-out 2; }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-clamp:2; overflow:hidden; }
    body { background:#020617; }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:8px; }
    ::-webkit-scrollbar-track { background:transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react,stage-3">
    const { useState, useMemo, useCallback, useRef } = React;

    const COLUMNS = [
      { id: "new",        title: "New Report",          subtitle: "Call 1",  accent: "border-sky-500",     dot: "bg-sky-500" },
      { id: "validation", title: "Police Validation",   subtitle: "Call 2",  accent: "border-violet-500",  dot: "bg-violet-500" },
      { id: "tracking",   title: "Active Tracking",     subtitle: "Call 3",  accent: "border-amber-500",   dot: "bg-amber-500" },
      { id: "closed",     title: "Recovered & Closed",  subtitle: "Call 4",  accent: "border-emerald-500", dot: "bg-emerald-500" },
    ];

    const PRIORITY_STYLES = {
      Critical: "bg-red-500/15 text-red-400 ring-1 ring-red-500/40",
      High:     "bg-orange-500/15 text-orange-400 ring-1 ring-orange-500/40",
      Medium:   "bg-yellow-500/15 text-yellow-300 ring-1 ring-yellow-500/40",
    };

    const SENTIMENTS = {
      Anxious:    { emoji: "😰", color: "#f97316" },
      Calm:       { emoji: "😌", color: "#38bdf8" },
      Frustrated: { emoji: "😠", color: "#ef4444" },
      Relieved:   { emoji: "😅", color: "#34d399" },
    };

    const SEED_CASES = [
      { id: "SVS-00206944", vehicle: "Ford F-150 Lightning", priority: "Critical", sentiment: "Anxious",    sop: "Standard Theft SOP",    summary: "Owner reports truck stolen from driveway overnight, GPS active.",  column: "new" },
      { id: "SVS-00206951", vehicle: "Ford Explorer ST",     priority: "High",     sentiment: "Frustrated", sop: "Standard Theft SOP",    summary: "Vehicle missing from mall parking; caller awaiting callback.",     column: "new" },
      { id: "SVS-00206938", vehicle: "Ford Mustang Mach-E",  priority: "Medium",   sentiment: "Calm",       sop: "Technical Support SOP", summary: "FordPass signal intermittent, verifying telematics handshake.",    column: "new" },
      { id: "SVS-00206922", vehicle: "Ford Bronco Raptor",   priority: "Critical", sentiment: "Anxious",    sop: "Police Liaison SOP",    summary: "Police report filed, validating case number with PD dispatch.",    column: "validation" },
      { id: "SVS-00206917", vehicle: "Ford Maverick",        priority: "High",     sentiment: "Frustrated", sop: "Police Liaison SOP",    summary: "Awaiting officer confirmation before activating live track.",      column: "validation" },
      { id: "SVS-00206901", vehicle: "Ford Transit",         priority: "High",     sentiment: "Anxious",    sop: "Standard Theft SOP",    summary: "Fleet van pinging location every 90s, units en route.",            column: "tracking" },
      { id: "SVS-00206889", vehicle: "Ford Escape",          priority: "Medium",   sentiment: "Calm",       sop: "Standard Theft SOP",    summary: "Tracking stable on I-94 corridor, coordinating intercept.",        column: "tracking" },
      { id: "SVS-00206875", vehicle: "Ford Edge",            priority: "Medium",   sentiment: "Relieved",   sop: "Standard Theft SOP",    summary: "Vehicle recovered intact, owner notified, case closing.",          column: "closed" },
      { id: "SVS-00206860", vehicle: "Ford Ranger",          priority: "High",     sentiment: "Relieved",   sop: "Police Liaison SOP",    summary: "Recovered by PD, paperwork archived, case resolved.",              column: "closed" },
    ];

    const VEHICLE_POOL = ["Ford F-150 Lightning","Ford Explorer","Ford Mustang Mach-E","Ford Bronco","Ford Maverick","Ford Expedition","Ford Escape","Ford Edge"];
    const PRIORITY_POOL = ["Critical", "High", "Medium"];
    const SENTIMENT_POOL = ["Anxious", "Frustrated", "Calm", "Relieved"];
    const SOP_POOL = ["Standard Theft SOP", "Police Liaison SOP", "Technical Support SOP"];
    const SUMMARY_POOL = [
      "New theft reported, GPS lock established, gathering owner details.",
      "Caller reports break-in, immobilizer status being verified.",
      "Possible unauthorized movement detected by FordPass geofence.",
      "Owner requesting urgent assistance, telematics coming online.",
    ];

    let idCounter = 206982;
    const nextCaseId = () => "SVS-00" + (idCounter++);
    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function KpiCard({ label, value, sub, icon, tone }) {
      return (
        <div className="flex-1 min-w-[180px] rounded-xl bg-slate-800/60 ring-1 ring-slate-700/60 px-5 py-4 backdrop-blur transition hover:ring-slate-500/70 hover:bg-slate-800">
          <div className="flex items-center justify-between">
            <span className="text-xs font-medium uppercase tracking-wider text-slate-400">{label}</span>
            <span className={"grid h-8 w-8 place-items-center rounded-lg text-sm " + tone}>{icon}</span>
          </div>
          <div className="mt-2 text-3xl font-semibold text-white tabular-nums">{value}</div>
          {sub && <div className="mt-0.5 text-xs text-slate-500">{sub}</div>}
        </div>
      );
    }

    function PriorityBadge({ priority }) {
      return (
        <span className={"rounded-md px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide " + PRIORITY_STYLES[priority]}>
          {priority}
        </span>
      );
    }

    function CaseCard({ data, onMove, onDragStart }) {
      const colIndex = COLUMNS.findIndex((c) => c.id === data.column);
      const canBack = colIndex > 0;
      const canForward = colIndex < COLUMNS.length - 1;
      return (
        <div
          draggable
          onDragStart={(e) => onDragStart(e, data.id)}
          className={"group cursor-grab active:cursor-grabbing rounded-xl bg-slate-800 ring-1 ring-slate-700/70 p-3.5 shadow-sm transition hover:ring-slate-500 hover:-translate-y-0.5 hover:shadow-lg " + (data.isNew ? "animate-pulse-once ring-sky-400/70" : "")}
        >
          <div className="flex items-start justify-between gap-2">
            <span className="font-mono text-xs font-semibold text-sky-300">{data.id}</span>
            <span className="text-lg leading-none" title={data.sentiment}>{SENTIMENTS[data.sentiment].emoji}</span>
          </div>
          <h4 className="mt-1.5 text-sm font-semibold text-white">{data.vehicle}</h4>
          <div className="mt-1.5 flex items-center gap-2 flex-wrap">
            <PriorityBadge priority={data.priority} />
            <span className="rounded-md bg-slate-700/60 px-2 py-0.5 text-[10px] font-medium text-slate-300">{data.sop}</span>
          </div>
          <p className="mt-2 text-xs leading-relaxed text-slate-400 line-clamp-2">{data.summary}</p>
          <div className="mt-3 flex items-center justify-between">
            <button onClick={() => onMove(data.id, -1)} disabled={!canBack}
              className="rounded-md px-2 py-1 text-xs text-slate-400 transition hover:bg-slate-700 hover:text-white disabled:opacity-25 disabled:hover:bg-transparent">
              ← Back
            </button>
            <button onClick={() => onMove(data.id, 1)} disabled={!canForward}
              className="rounded-md bg-slate-700 px-2.5 py-1 text-xs font-medium text-white transition hover:bg-sky-600 disabled:opacity-25 disabled:hover:bg-slate-700">
              Advance →
            </button>
          </div>
        </div>
      );
    }

    function KanbanColumn({ column, cases, onMove, onDragStart, onDrop }) {
      const [over, setOver] = useState(false);
      return (
        <div
          onDragOver={(e) => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={(e) => { setOver(false); onDrop(e, column.id); }}
          className={"flex min-w-[260px] flex-1 flex-col rounded-2xl bg-slate-900/50 ring-1 transition " + (over ? "ring-sky-400/70 bg-slate-800/50" : "ring-slate-800")}
        >
          <div className={"flex items-center justify-between rounded-t-2xl border-t-4 " + column.accent + " px-4 py-3"}>
            <div>
              <div className="flex items-center gap-2">
                <span className={"h-2 w-2 rounded-full " + column.dot} />
                <h3 className="text-sm font-semibold text-white">{column.title}</h3>
              </div>
              <span className="ml-4 text-[11px] uppercase tracking-wider text-slate-500">{column.subtitle}</span>
            </div>
            <span className="grid h-6 w-6 place-items-center rounded-full bg-slate-700 text-xs font-bold text-slate-200">{cases.length}</span>
          </div>
          <div className="flex flex-1 flex-col gap-3 overflow-y-auto p-3" style={{ maxHeight: "calc(100vh - 360px)" }}>
            {cases.length === 0 && (
              <div className="grid flex-1 place-items-center rounded-lg border border-dashed border-slate-700 py-10 text-xs text-slate-600">
                Drop cases here
              </div>
            )}
            {cases.map((c) => (
              <CaseCard key={c.id} data={c} onMove={onMove} onDragStart={onDragStart} />
            ))}
          </div>
        </div>
      );
    }

    function SopBarChart({ data }) {
      const sum = data.reduce((s, x) => s + x.value, 0);
      const max = Math.max(...data.map((d) => d.value), 1);
      const colors = ["#38bdf8", "#a78bfa", "#fbbf24"];
      return (
        <div className="space-y-3">
          {data.map((d, i) => {
            const pct = Math.round((d.value / (sum || 1)) * 100);
            return (
              <div key={d.label}>
                <div className="mb-1 flex items-center justify-between text-xs">
                  <span className="text-slate-300">{d.label}</span>
                  <span className="font-semibold text-slate-400 tabular-nums">{pct}%</span>
                </div>
                <div className="h-2.5 w-full overflow-hidden rounded-full bg-slate-700/60">
                  <div className="h-full rounded-full transition-all duration-700 ease-out"
                    style={{ width: ((d.value / max) * 100) + "%", backgroundColor: colors[i % colors.length] }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function SentimentDonut({ data }) {
      const total = data.reduce((s, d) => s + d.value, 0) || 1;
      const radius = 52;
      const circ = 2 * Math.PI * radius;
      let offset = 0;
      return (
        <div className="flex items-center gap-4">
          <svg viewBox="0 0 140 140" className="h-32 w-32 -rotate-90">
            <circle cx="70" cy="70" r={radius} fill="none" stroke="#1e293b" strokeWidth="16" />
            {data.map((d) => {
              const dash = (d.value / total) * circ;
              const seg = (
                <circle key={d.label} cx="70" cy="70" r={radius} fill="none"
                  stroke={SENTIMENTS[d.label].color} strokeWidth="16"
                  strokeDasharray={dash + " " + (circ - dash)}
                  strokeDashoffset={-offset}
                  className="transition-all duration-700" />
              );
              offset += dash;
              return seg;
            })}
          </svg>
          <div className="flex-1 space-y-1.5">
            {data.map((d) => (
              <div key={d.label} className="flex items-center justify-between text-xs">
                <span className="flex items-center gap-1.5 text-slate-300">
                  <span className="h-2.5 w-2.5 rounded-sm" style={{ backgroundColor: SENTIMENTS[d.label].color }} />
                  {SENTIMENTS[d.label].emoji} {d.label}
                </span>
                <span className="font-semibold text-slate-400 tabular-nums">{d.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AlertBox({ alerts }) {
      const toneMap = {
        critical: "border-red-500/40 bg-red-500/10 text-red-300",
        warn:     "border-amber-500/40 bg-amber-500/10 text-amber-300",
        info:     "border-sky-500/40 bg-sky-500/10 text-sky-300",
      };
      const iconMap = { critical: "🚨", warn: "⚠️", info: "ℹ️" };
      return (
        <div className="space-y-2">
          {alerts.map((a, i) => (
            <div key={i} className={"flex items-start gap-2 rounded-lg border px-3 py-2 text-xs " + toneMap[a.type]}>
              <span>{iconMap[a.type]}</span>
              <span className="leading-snug">{a.text}</span>
            </div>
          ))}
        </div>
      );
    }

    function SVSDashboard() {
      const [cases, setCases] = useState(SEED_CASES);
      const [processing, setProcessing] = useState(false);
      const [processingName, setProcessingName] = useState("");
      const dragId = useRef(null);

      const metrics = useMemo(() => {
        const active = cases.filter((c) => c.column !== "closed").length;
        const critical = cases.filter((c) => c.priority === "Critical").length;
        return { active, todaysCalls: cases.length, critical };
      }, [cases]);

      const sopData = useMemo(() =>
        SOP_POOL.map((sop) => ({ label: sop, value: cases.filter((c) => c.sop === sop).length })),
      [cases]);

      const sentimentData = useMemo(() =>
        Object.keys(SENTIMENTS).map((s) => ({ label: s, value: cases.filter((c) => c.sentiment === s).length })),
      [cases]);

      const alerts = useMemo(() => {
        const refreshFlags = cases.filter((c) => c.sop === "Technical Support SOP").length;
        const criticalTracking = cases.filter((c) => c.priority === "Critical" && c.column === "tracking").length;
        const stalledValidation = cases.filter((c) => c.column === "validation").length;
        return [
          { type: "critical", text: metrics.critical + " cases flagged 'Critical' — escalate to live agent." },
          { type: "warn",     text: refreshFlags + " cases flagged 'FordPass Refresh Limit'." },
          { type: "info",     text: stalledValidation + " case(s) awaiting Police Validation response." },
          { type: "warn",     text: criticalTracking + " critical vehicle(s) currently in active pursuit." },
        ];
      }, [cases, metrics]);

      const moveCase = useCallback((id, dir) => {
        setCases((prev) => prev.map((c) => {
          if (c.id !== id) return c;
          const idx = COLUMNS.findIndex((col) => col.id === c.column);
          const newIdx = Math.min(Math.max(idx + dir, 0), COLUMNS.length - 1);
          return { ...c, column: COLUMNS[newIdx].id, isNew: false };
        }));
      }, []);

      const handleDragStart = (e, id) => { dragId.current = id; };
      const handleDrop = (e, columnId) => {
        e.preventDefault();
        const id = dragId.current;
        if (!id) return;
        setCases((prev) => prev.map((c) => (c.id === id ? { ...c, column: columnId, isNew: false } : c)));
        dragId.current = null;
      };

      const simulateUpload = () => {
        if (processing) return;
        const newId = nextCaseId();
        setProcessingName(newId + "_Call_1.wav");
        setProcessing(true);
        setTimeout(() => {
          const newCase = {
            id: newId,
            vehicle: rand(VEHICLE_POOL),
            priority: rand(PRIORITY_POOL),
            sentiment: rand(SENTIMENT_POOL),
            sop: rand(SOP_POOL),
            summary: rand(SUMMARY_POOL),
            column: "new",
            isNew: true,
          };
          setCases((prev) => [newCase].concat(prev));
          setProcessing(false);
          setTimeout(() => {
            setCases((prev) => prev.map((c) => (c.id === newId ? { ...c, isNew: false } : c)));
          }, 2500);
        }, 2600);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans">
          <header className="sticky top-0 z-20 border-b border-slate-800 bg-slate-950/80 px-6 py-4 backdrop-blur">
            <div className="flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-sky-500 to-blue-700 font-bold text-white shadow-lg">SVS</div>
                <div>
                  <h1 className="text-lg font-bold tracking-tight text-white">Stolen Vehicle Services</h1>
                  <p className="text-xs text-slate-400">Operations Command — Transcript Intelligence Dashboard</p>
                </div>
              </div>
              <button onClick={simulateUpload} disabled={processing}
                className="flex items-center gap-2 rounded-xl bg-gradient-to-r from-sky-500 to-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg transition hover:from-sky-400 hover:to-blue-500 disabled:opacity-60">
                {processing ? (
                  <React.Fragment>
                    <span className="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white" />
                    Processing…
                  </React.Fragment>
                ) : "⬆ Upload Audio File"}
              </button>
            </div>
          </header>

          {processing && (
            <div className="mx-6 mt-4 flex items-center gap-3 rounded-xl border border-sky-500/40 bg-sky-500/10 px-4 py-3 text-sm">
              <span className="h-4 w-4 animate-spin rounded-full border-2 border-sky-400/40 border-t-sky-400" />
              <span className="font-mono text-sky-300">{processingName}</span>
              <span className="text-slate-300">— Transcribing audio · Mapping SOP · Scoring sentiment…</span>
            </div>
          )}

          <section className="flex flex-wrap gap-4 px-6 py-5">
            <KpiCard label="Active Cases" value={metrics.active} sub="In open columns" icon="📁" tone="bg-sky-500/15 text-sky-400" />
            <KpiCard label="Todays Calls" value={metrics.todaysCalls} sub="Transcripts processed" icon="📞" tone="bg-violet-500/15 text-violet-400" />
            <KpiCard label="Avg. Recovery Time" value="4.2 Hours" sub="↓ 12% vs last week" icon="⏱" tone="bg-emerald-500/15 text-emerald-400" />
            <KpiCard label="Urgent Alerts" value={metrics.critical} sub="Marked Critical" icon="🚨" tone="bg-red-500/15 text-red-400" />
          </section>

          <main className="grid grid-cols-1 gap-5 px-6 pb-8 xl:grid-cols-[1fr_340px]">
            <div className="flex gap-4 overflow-x-auto pb-2">
              {COLUMNS.map((col) => (
                <KanbanColumn key={col.id} column={col}
                  cases={cases.filter((c) => c.column === col.id)}
                  onMove={moveCase}
                  onDragStart={handleDragStart}
                  onDrop={handleDrop} />
              ))}
            </div>

            <aside className="flex flex-col gap-5">
              <div className="rounded-2xl bg-slate-900/60 ring-1 ring-slate-800 p-5">
                <h3 className="mb-4 text-sm font-semibold text-white">SOP Breakdown</h3>
                <SopBarChart data={sopData} />
              </div>

              <div className="rounded-2xl bg-slate-900/60 ring-1 ring-slate-800 p-5">
                <h3 className="mb-4 text-sm font-semibold text-white">Caller Sentiment</h3>
                <SentimentDonut data={sentimentData} />
              </div>

              <div className="rounded-2xl bg-slate-900/60 ring-1 ring-slate-800 p-5">
                <h3 className="mb-3 text-sm font-semibold text-white">System Alerts</h3>
                <AlertBox alerts={alerts} />
              </div>
            </aside>
          </main>

          <footer className="px-6 pb-6 text-center text-xs text-slate-600">
            SVS Operations Command · Demo prototype · Drag cards between columns or use the Advance / Back buttons
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<SVSDashboard />);
  </script>
</body>
</html>
